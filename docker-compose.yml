version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockflow-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET:-CHANGE_THIS_TO_A_SECURE_RANDOM_64_CHAR_STRING}
      REFRESH_SECRET: ${REFRESH_SECRET:-CHANGE_THIS_REFRESH_SECRET_64_CHAR_STRING}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      DB_PATH: /app/data/inventory.db
    volumes:
      - db_data:/app/data
    networks:
      - stockflow_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stockflow-frontend
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - stockflow_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  db_data:
    driver: local

networks:
  stockflow_net:
    driver: bridge
